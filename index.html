<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn in Dream</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d1a;--paper:#f5f0e8;--gold:#c9a84c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);color:var(--paper);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(123,94,167,.15) 0%,transparent 60%),radial-gradient(ellipse 100% 100% at 50% 50%,#0d0d1a 40%,#14082a 100%);z-index:0;pointer-events:none;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--o,.8);transform:scale(1)}}
.container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:50px 24px 80px;display:flex;flex-direction:column;align-items:center;}
.moon{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#f5e6c8,#c9a84c 60%,#8a6a20);box-shadow:0 0 40px rgba(201,168,76,.4),0 0 80px rgba(201,168,76,.15);margin-bottom:24px;animation:moonFloat 6s ease-in-out infinite;}
@keyframes moonFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,8vw,5.2rem);font-weight:900;line-height:1;text-align:center;background:linear-gradient(135deg,#f5e6c8 0%,#c9a84c 40%,#e8d5ff 70%,#c9a84c 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 6s ease-in-out infinite;margin-bottom:8px;}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:rgba(184,196,212,.6);margin-bottom:48px;letter-spacing:.05em;}
.input-card{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:28px 32px;backdrop-filter:blur(12px);box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);margin-bottom:36px;}
.prompt-prefix{font-size:.78rem;font-weight:500;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;display:block;}
.input-row{display:flex;gap:12px;align-items:stretch;}
input[type="text"]{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:15px 18px;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--paper);outline:none;transition:border-color .3s,box-shadow .3s;caret-color:var(--gold);}
input[type="text"]::placeholder{color:rgba(184,196,212,.35);}
input[type="text"]:focus{border-color:rgba(201,168,76,.5);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
.go-btn{background:linear-gradient(135deg,#c9a84c,#a07830);color:var(--ink);border:none;border-radius:12px;padding:15px 30px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:transform .2s,box-shadow .2s,opacity .2s;box-shadow:0 4px 20px rgba(201,168,76,.35);}
.go-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,.5);}
.go-btn:disabled{opacity:.4;cursor:not-allowed;}
.error-msg{color:#ff8a8a;font-size:.85rem;margin-top:12px;text-align:center;display:none;line-height:1.5;}
#output-area{width:100%;display:none;}
.video-wrapper{width:100%;background:#000;border-radius:18px;overflow:hidden;border:1px solid rgba(201,168,76,.2);box-shadow:0 20px 80px rgba(0,0,0,.7);position:relative;aspect-ratio:16/9;}
#dream-canvas{width:100%;height:100%;display:block;background:#050510;}
.loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050510;z-index:10;}
.loading-overlay.hidden{display:none;}
.orb-ring{width:64px;height:64px;border-radius:50%;border:2px solid transparent;border-top-color:var(--gold);border-right-color:rgba(201,168,76,.3);animation:spin 1.2s linear infinite;margin-bottom:18px;box-shadow:0 0 20px rgba(201,168,76,.3);}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Playfair Display',serif;font-style:italic;color:rgba(184,196,212,.6);font-size:.95rem;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.video-bar{display:flex;align-items:center;gap:14px;padding:12px 18px;background:rgba(5,5,16,.95);border-top:1px solid rgba(255,255,255,.06);}
.ctrl-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-size:1.1rem;padding:4px;line-height:1;transition:transform .2s;}
.ctrl-btn:hover{transform:scale(1.15);}
.progress-track{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#e8d5ff);border-radius:2px;width:0%;transition:width .1s linear;}
.time-label{font-size:.72rem;color:rgba(184,196,212,.6);white-space:nowrap;font-variant-numeric:tabular-nums;}
.vol-btn{background:none;border:none;cursor:pointer;font-size:.95rem;color:rgba(184,196,212,.5);transition:color .2s;padding:2px;}
.vol-btn:hover{color:var(--gold);}
#transcript-area{margin-top:24px;display:none;}
.transcript-label{font-size:.75rem;font-weight:500;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;}
.transcript-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px;font-size:.88rem;line-height:1.85;color:rgba(184,196,212,.7);max-height:240px;overflow-y:auto;}
.transcript-box::-webkit-scrollbar{width:4px;}
.transcript-box::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <div class="moon"></div>
  <h1>Learn in Dream</h1>
  <p class="tagline">where knowledge blooms while the world sleeps</p>
  <div class="input-card">
    <span class="prompt-prefix">&#10022; Tonight's lesson</span>
    <div class="input-row">
      <input type="text" id="topic-input" placeholder="e.g. the lifecycle of stars, quantum entanglement&hellip;" />
      <button class="go-btn" id="go-btn" onclick="generateVideo()">Go &#10022;</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>
  <div id="output-area">
    <div class="video-wrapper">
      <canvas id="dream-canvas"></canvas>
      <div class="loading-overlay" id="loading-overlay">
        <div class="orb-ring"></div>
        <div class="loading-text" id="loading-text">Weaving your dream lesson&hellip;</div>
      </div>
    </div>
    <div class="video-bar">
      <button class="ctrl-btn" id="play-btn" onclick="togglePlayback()">&#9208;</button>
      <button class="ctrl-btn" onclick="restartVideo()" title="Restart">&#8634;</button>
      <div class="progress-track" onclick="seekVideo(event)">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="time-label" id="time-label">0:00 / 0:00</span>
      <button class="vol-btn" id="vol-btn" onclick="toggleMute()" title="Toggle narration">&#128266;</button>
    </div>
    <div id="transcript-area">
      <div class="transcript-label">&#10022; Full Script</div>
      <div class="transcript-box" id="transcript-box"></div>
    </div>
  </div>
</div>
<script>
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<140;i++){
    var el=document.createElement('div');
    el.className='star';
    var sz=Math.random()*2.5+.5;
    el.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(2+Math.random()*5)+'s;--o:'+(0.3+Math.random()*0.7)+';animation-delay:'+Math.random()*6+'s';
    s.appendChild(el);
  }
})();

var canvas=document.getElementById('dream-canvas');
var ctx=canvas.getContext('2d');
function resizeCanvas(){var w=canvas.parentElement.clientWidth;canvas.width=w;canvas.height=Math.round(w*9/16);}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

var slides=[], currentSlide=0, totalDuration=0;
var isPlaying=false, animFrame=null, videoStarted=false;
var elapsed=0, lastTimestamp=null, fullScript='';
var isMuted=false, audioCtx=null, musicNodes=[];

async function callAI(topic) {
  var models = ['fast-video'];
  var prompt = 'Return ONLY a JSON object (no markdown, no backticks) for a lesson about: ' + topic + '. Use this exact structure: {"slides":[{"type":"title","headline":"Learn in Dream","subtitle":"tonight we explore ' + topic + '","duration":6},{"type":"content","headline":"Introduction","bullets":["First key point","Second key point","Third key point"],"duration":11},{"type":"fact","headline":"Did You Know","fact":"An amazing fact about ' + topic + '","context":"Why this matters","duration":10},{"type":"content","headline":"Core Concepts","bullets":["Concept one explained","Concept two explained","Concept three explained"],"duration":11},{"type":"quote","headline":"Wisdom","quote":"A famous quote related to ' + topic + '","attribution":"Author Name","duration":9},{"type":"content","headline":"Real World Impact","bullets":["Application one","Application two","Application three"],"duration":11},{"type":"fact","headline":"Key Insight","fact":"A striking truth about ' + topic + '","context":"The deeper meaning","duration":10},{"type":"content","headline":"Key Takeaways","bullets":["Most important lesson","Second lesson","Third lesson"],"duration":11},{"type":"title","headline":"Sweet Dreams","subtitle":"you now understand ' + topic + '","duration":6}],"fullScript":"Write 260 words of poetic narration for this lesson here"}';

  var lastErr = null;
  for (var i = 0; i < models.length; i++) {
    var model = models[i];
    try {
      var url = 'https://text.pollinations.ai/' + encodeURIComponent(prompt) + '?model=' + model + '&seed=' + Math.floor(Math.random()*9999) + '&json=true';
      var res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var text = await res.text();
      if (!text || text.trim().length < 20) throw new Error('Empty response');
      console.log('Got response from model:', model);
      console.log('RAW RESPONSE:', text.trim().substring(0,500));
      return text.trim();
    } catch(e) {
      console.warn('Model ' + model + ' failed:', e.message);
      lastErr = e;
    }
  }
  throw lastErr || new Error('All models failed');
}

function parseResponse(raw, topic) {
  var cleaned = raw.trim();

  // If it is a reasoning wrapper like {"role":"assistant","reasoning_content":"...","content":"..."}
  // extract the actual content field
  try {
    var wrapper = JSON.parse(cleaned);
    if (wrapper.content) cleaned = wrapper.content;
    else if (wrapper.choices && wrapper.choices[0]) cleaned = wrapper.choices[0].message.content;
  } catch(e) { /* not a wrapper, continue */ }

  // Strip markdown fences
  cleaned = cleaned.trim();
  if (cleaned.indexOf('```') !== -1) {
    cleaned = cleaned.replace(/```json/gi,'').replace(/```/g,'').trim();
  }

  // Extract JSON object - grab everything between first { and last }
  var start = cleaned.indexOf('{');
  var end = cleaned.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('No JSON found. Got: ' + cleaned.substring(0,200));
  var jsonStr = cleaned.substring(start, end+1);

  var parsed;
  try { parsed = JSON.parse(jsonStr); }
  catch(e) { throw new Error('Parse failed: ' + e.message + ' | ' + jsonStr.substring(0,200)); }

  if (!parsed.slides || !parsed.slides.length) throw new Error('No slides. Got: ' + JSON.stringify(parsed).substring(0,200));
  return parsed;
}

async function generateVideo() {
  var topic = document.getElementById('topic-input').value.trim();
  var errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  if (!topic) { showError('Please enter a topic to learn about.'); return; }

  document.getElementById('go-btn').disabled = true;
  stopSpeech(); stopMusic();
  document.getElementById('output-area').style.display = 'block';
  document.getElementById('transcript-area').style.display = 'none';
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('loading-text').textContent = 'Weaving your dream lesson...';
  document.getElementById('output-area').scrollIntoView({behavior:'smooth',block:'start'});

  try {
    document.getElementById('loading-text').textContent = 'Generating lesson...';
    var raw = await callAI(topic);
    var parsed = parseResponse(raw, topic);
    slides = parsed.slides;
    fullScript = parsed.fullScript || ('Welcome to Learn in Dream. Tonight we explore ' + topic + '.');
    totalDuration = slides.reduce(function(s,sl){ return s+(sl.duration||9); }, 0);
    if (fullScript) {
      document.getElementById('transcript-box').textContent = fullScript;
      document.getElementById('transcript-area').style.display = 'block';
    }
    document.getElementById('loading-overlay').classList.add('hidden');
    videoStarted = true; elapsed = 0; lastTimestamp = null; isPlaying = true;
    document.getElementById('play-btn').innerHTML = '&#9208;';
    startMusic(); startNarration(fullScript);
    requestAnimationFrame(playLoop);
  } catch(e) {
    showError('Error: ' + e.message);
    document.getElementById('loading-overlay').classList.add('hidden');
    console.error(e);
  }
  document.getElementById('go-btn').disabled = false;
}

function showError(msg) { var el=document.getElementById('error-msg'); el.textContent=msg; el.style.display='block'; }

function playLoop(ts) {
  if (!isPlaying) return;
  if (lastTimestamp !== null) elapsed += (ts - lastTimestamp) / 1000;
  lastTimestamp = ts;
  if (elapsed >= totalDuration) {
    elapsed = totalDuration; isPlaying = false;
    document.getElementById('play-btn').innerHTML = '&#9654;';
    stopSpeech(); updateProgress(); return;
  }
  var acc=0, si=slides.length-1, st=0;
  for (var i=0; i<slides.length; i++) {
    if (elapsed < acc + slides[i].duration) { si=i; st=acc; break; }
    acc += slides[i].duration;
  }
  currentSlide = si;
  renderSlide(slides[si], elapsed-st, slides[si].duration);
  updateProgress();
  animFrame = requestAnimationFrame(playLoop);
}

function updateProgress() {
  var pct = Math.min(100,(elapsed/totalDuration)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('time-label').textContent = fmt(elapsed)+' / '+fmt(totalDuration);
}

function togglePlayback() {
  if (!videoStarted) return;
  isPlaying = !isPlaying;
  document.getElementById('play-btn').innerHTML = isPlaying ? '&#9208;' : '&#9654;';
  if (isPlaying) { if (elapsed>=totalDuration){elapsed=0;startNarration(fullScript);} lastTimestamp=null; requestAnimationFrame(playLoop); }
  else { cancelAnimationFrame(animFrame); lastTimestamp=null; }
}

function restartVideo() {
  if (!videoStarted) return;
  elapsed=0; lastTimestamp=null; isPlaying=true;
  document.getElementById('play-btn').innerHTML='&#9208;';
  stopSpeech(); startNarration(fullScript);
  requestAnimationFrame(playLoop);
}

function seekVideo(e) {
  if (!videoStarted) return;
  var r=e.currentTarget.getBoundingClientRect();
  elapsed=Math.max(0,Math.min(totalDuration,((e.clientX-r.left)/r.width)*totalDuration));
  lastTimestamp=null;
}

function fmt(s){ var m=Math.floor(s/60),ss=Math.floor(s%60).toString().padStart(2,'0'); return m+':'+ss; }

function startNarration(text) {
  if (!text||isMuted||!window.speechSynthesis) return;
  stopSpeech();
  var u=new SpeechSynthesisUtterance(text);
  u.rate=0.9; u.pitch=1.0; u.volume=0.85;
  var voices=window.speechSynthesis.getVoices();
  var v=voices.find(function(v){return v.name.toLowerCase().includes('google')&&v.lang.startsWith('en');})||voices.find(function(v){return v.lang.startsWith('en');});
  if(v) u.voice=v;
  window.speechSynthesis.speak(u);
}
function stopSpeech(){ if(window.speechSynthesis) window.speechSynthesis.cancel(); }
function toggleMute() {
  isMuted=!isMuted;
  document.getElementById('vol-btn').innerHTML=isMuted?'&#128264;':'&#128266;';
  if(isMuted) stopSpeech();
  else if(videoStarted&&isPlaying) startNarration(fullScript);
}
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=function(){};

function startMusic() {
  try {
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var master=audioCtx.createGain();
    master.gain.setValueAtTime(0,audioCtx.currentTime);
    master.gain.linearRampToValueAtTime(0.05,audioCtx.currentTime+4);
    master.connect(audioCtx.destination);
    [65.4,98,130.8,164.8,196,261.6,329.6].forEach(function(f,i){
      var osc=audioCtx.createOscillator(),g=audioCtx.createGain(),lfo=audioCtx.createOscillator(),lg=audioCtx.createGain();
      osc.type=i%2===0?'sine':'triangle'; osc.frequency.value=f;
      lfo.frequency.value=0.1+i*0.04; lg.gain.value=0.3;
      lfo.connect(lg); lg.connect(osc.frequency);
      g.gain.value=0.1/Math.sqrt(i+1);
      osc.connect(g); g.connect(master);
      lfo.start(audioCtx.currentTime+i*0.2); osc.start(audioCtx.currentTime+i*0.2);
      musicNodes.push(osc,lfo);
    });
  } catch(e){ console.log('Web Audio unavailable'); }
}
function stopMusic(){
  musicNodes.forEach(function(n){try{n.stop();}catch(e){}});
  musicNodes=[];
  if(audioCtx){try{audioCtx.close();}catch(e){} audioCtx=null;}
}

var PAL=[
  ['#0d0d2e','#1a0a3a','#7b5ea7','#c9a84c'],
  ['#050f1a','#0a2030','#4a8fa8','#c9a84c'],
  ['#0d1a0d','#0a2a10','#4a9a6a','#e8c44c'],
  ['#1a0a0a','#2a0a1a','#a84c7b','#c9a84c'],
  ['#0a0a1a','#050a30','#4c5ea8','#e8d5ff'],
  ['#1a1000','#2a1800','#c87820','#f0e0a0']
];

function renderSlide(slide,localT,dur){
  resizeCanvas();
  var W=canvas.width, H=canvas.height, pal=PAL[currentSlide%PAL.length];
  var fd=Math.min(0.65,dur*.12), alpha=1;
  if(localT<fd) alpha=localT/fd;
  else if(localT>dur-fd) alpha=(dur-localT)/fd;
  alpha=Math.max(0,Math.min(1,alpha));
  var bg=ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.4,W*.85);
  bg.addColorStop(0,pal[1]); bg.addColorStop(1,pal[0]);
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  [[.68,.32,.25,2],[.25,.65,.18,3]].forEach(function(o,oi){
    var ox=W*(o[0]+.07*Math.sin(localT*(.4+oi*.1)));
    var oy=H*(o[1]+.06*Math.cos(localT*(.3+oi*.1)));
    var og=ctx.createRadialGradient(ox,oy,0,ox,oy,W*o[2]);
    og.addColorStop(0,pal[o[3]]+(oi===0?'44':'28')); og.addColorStop(1,'transparent');
    ctx.fillStyle=og; ctx.beginPath(); ctx.arc(ox,oy,W*o[2],0,Math.PI*2); ctx.fill();
  });
  ctx.save();
  for(var i=0;i<22;i++){
    var px=((i*137.5+localT*9*(i%3?-.6:1))%W+W)%W;
    var py=((i*83.7+localT*6*(i%2?-1:1))%H+H)%H;
    var pr=(Math.sin(i*1.3)*.5+.5)*2+.5;
    ctx.globalAlpha=(Math.sin(localT+i)*.5+.5)*.3+.05;
    ctx.fillStyle=i%3?'#ffffff':pal[3];
    ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
  ctx.globalAlpha=alpha;
  if(slide.type==='title') drawTitle(slide,W,H,pal,localT);
  else if(slide.type==='quote') drawQuote(slide,W,H,pal,localT);
  else if(slide.type==='fact') drawFact(slide,W,H,pal,localT);
  else drawContent(slide,W,H,pal,localT);
  ctx.globalAlpha=1;
}

function wrap(text,maxW){
  if(!text) return [''];
  var words=String(text).split(' '),line='',lines=[];
  for(var i=0;i<words.length;i++){
    var t=line?line+' '+words[i]:words[i];
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=words[i];}else line=t;
  }
  if(line) lines.push(line);
  return lines;
}

function drawTitle(s,W,H,pal,t){
  var cx=W/2; ctx.textAlign='center'; ctx.textBaseline='middle';
  var fs=Math.min(W*.082,66);
  ctx.font='900 '+fs+'px "Playfair Display",serif';
  ctx.shadowColor=pal[3]; ctx.shadowBlur=40; ctx.fillStyle='#f5e6c8';
  ctx.fillText(s.headline||'Learn in Dream',cx,H*.38); ctx.shadowBlur=0;
  if(s.subtitle){
    ctx.font='italic '+Math.min(W*.033,25)+'px "Playfair Display",serif';
    ctx.fillStyle='rgba(184,196,212,.8)';
    var lines=wrap(s.subtitle,W*.65),y=H*.54;
    lines.forEach(function(l){ctx.fillText(l,cx,y);y+=Math.min(W*.045,32);});
  }
  [-.18,-.09,0,.09,.18].forEach(function(o,i){
    var p=Math.min(1,(t-i*.18)/.5); if(p<=0) return;
    ctx.save(); ctx.globalAlpha*=p*.65; ctx.fillStyle=pal[3];
    ctx.beginPath(); ctx.arc(cx+o*W,H*.72,2.5,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

function drawContent(s,W,H,pal,t){
  var pad=W*.08; ctx.textAlign='left'; ctx.textBaseline='top';
  var hfs=Math.min(W*.05,38);
  ctx.font='700 '+hfs+'px "Playfair Display",serif';
  ctx.shadowColor=pal[3]; ctx.shadowBlur=10; ctx.fillStyle=pal[3];
  var hlines=wrap(s.headline||'',W*.82),hy=H*.1;
  hlines.forEach(function(l){ctx.fillText(l,pad,hy);hy+=hfs*1.3;});
  ctx.shadowBlur=0;
  ctx.strokeStyle=pal[3]; ctx.lineWidth=1.5; ctx.globalAlpha*=.4;
  ctx.beginPath(); ctx.moveTo(pad,hy+4); ctx.lineTo(pad+W*.09,hy+4); ctx.stroke();
  ctx.globalAlpha=Math.min(ctx.globalAlpha/.4,1);
  var bullets=s.bullets||[], bfs=Math.min(W*.032,22);
  ctx.font='400 '+bfs+'px "DM Sans",sans-serif';
  var lh=bfs*1.9, gap=(s.duration*.68)/(bullets.length||1), by=hy+H*.09;
  bullets.forEach(function(b,i){
    var rt=i*gap; if(t<rt) return;
    var ba=Math.min(1,(t-rt)/.45);
    ctx.save(); ctx.globalAlpha*=ba;
    ctx.fillStyle=pal[3]; ctx.beginPath(); ctx.arc(pad+5,by+bfs*.5,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(230,225,215,.92)';
    var bl=wrap(String(b),W*.79);
    bl.forEach(function(l){ctx.fillText(l,pad+20,by);by+=lh;});
    by+=bfs*.25; ctx.restore();
  });
}

function drawQuote(s,W,H,pal,t){
  var cx=W/2; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='900 '+W*.13+'px "Playfair Display",serif';
  ctx.fillStyle=pal[2]+'50'; ctx.fillText('"',cx-W*.07,H*.28);
  var qfs=Math.min(W*.037,27);
  ctx.font='italic '+qfs+'px "Playfair Display",serif';
  ctx.fillStyle='#f0e8d8'; ctx.shadowColor=pal[3]; ctx.shadowBlur=8;
  var qlines=wrap(s.quote||'',W*.68),qy=H*.44-(qlines.length*qfs*1.6)/2;
  qlines.forEach(function(l){ctx.fillText(l,cx,qy);qy+=qfs*1.6;}); ctx.shadowBlur=0;
  if(s.attribution){ctx.font='500 '+Math.min(W*.025,18)+'px "DM Sans",sans-serif';ctx.fillStyle=pal[3];ctx.fillText('- '+s.attribution,cx,qy+qfs);}
  if(s.headline){ctx.font='600 '+Math.min(W*.028,20)+'px "DM Sans",sans-serif';ctx.fillStyle='rgba(184,196,212,.4)';ctx.fillText(s.headline.toUpperCase(),cx,H*.17);}
}

function drawFact(s,W,H,pal,t){
  var cx=W/2; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(s.headline){ctx.font='500 '+Math.min(W*.027,19)+'px "DM Sans",sans-serif';ctx.fillStyle=pal[3]+'99';ctx.fillText(s.headline.toUpperCase(),cx,H*.18);}
  var ffs=Math.min(W*.053,40);
  ctx.font='900 '+ffs+'px "Playfair Display",serif'; ctx.fillStyle='#f5e6c8'; ctx.shadowColor=pal[2]; ctx.shadowBlur=30;
  var flines=wrap(s.fact||'',W*.7),fy=H*.44-(flines.length*ffs*1.3)/2;
  flines.forEach(function(l){ctx.fillText(l,cx,fy);fy+=ffs*1.3;}); ctx.shadowBlur=0;
  if(s.context){
    ctx.font='italic '+Math.min(W*.026,18)+'px "Playfair Display",serif'; ctx.fillStyle='rgba(184,196,212,.55)';
    var cl=wrap(s.context,W*.6);
    cl.forEach(function(l){ctx.fillText(l,cx,fy+18);fy+=Math.min(W*.036,26);});
  }
}

document.getElementById('topic-input').addEventListener('keydown',function(e){if(e.key==='Enter') generateVideo();});
