<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn in Dream</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d1a;
    --paper: #f5f0e8;
    --gold: #c9a84c;
    --dream: #7b5ea7;
    --mist: #b8c4d4;
    --glow: #e8d5ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--o, 0.8); transform: scale(1); }
  }

  /* Nebula bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(123,94,167,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 100% 100% at 50% 50%, rgba(13,13,26,1) 40%, rgba(20,10,40,1) 100%);
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Moon decoration */
  .moon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f5e6c8, #c9a84c 60%, #8a6a20);
    box-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.15);
    margin-bottom: 28px;
    position: relative;
    animation: moonFloat 6s ease-in-out infinite;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: 12px; left: 18px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(0,0,0,0.12);
    box-shadow: 18px 20px 0 8px rgba(0,0,0,0.07), 32px 10px 0 5px rgba(0,0,0,0.05);
  }
  @keyframes moonFloat {
    0%, 100% { transform: translateY(0px); box-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.15); }
    50% { transform: translateY(-10px); box-shadow: 0 0 60px rgba(201,168,76,0.6), 0 0 120px rgba(201,168,76,0.25); }
  }

  /* Header */
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 900;
    line-height: 1;
    text-align: center;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f5e6c8 0%, #c9a84c 40%, #e8d5ff 70%, #c9a84c 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s ease-in-out infinite;
    margin-bottom: 10px;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: rgba(184,196,212,0.7);
    margin-bottom: 56px;
    letter-spacing: 0.05em;
  }

  /* Input area */
  .input-card {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 20px;
    padding: 32px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    margin-bottom: 40px;
  }

  .prompt-prefix {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  input[type="text"] {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--paper);
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    caret-color: var(--gold);
  }
  input[type="text"]::placeholder { color: rgba(184,196,212,0.35); }
  input[type="text"]:focus {
    border-color: rgba(201,168,76,0.5);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .go-btn {
    background: linear-gradient(135deg, #c9a84c, #a07830);
    color: var(--ink);
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(201,168,76,0.35);
    position: relative;
    overflow: hidden;
  }
  .go-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .go-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.5); }
  .go-btn:hover:not(:disabled)::after { opacity: 1; }
  .go-btn:active:not(:disabled) { transform: translateY(0); }
  .go-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Video / output area */
  #output-area {
    width: 100%;
    display: none;
  }

  .video-wrapper {
    width: 100%;
    background: #000;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(201,168,76,0.2);
    box-shadow: 0 20px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
    aspect-ratio: 16/9;
  }

  /* The "video" canvas */
  #dream-canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: #050510;
  }

  /* Video overlay controls bar */
  .video-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    background: rgba(5,5,16,0.9);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .play-btn {
    background: none;
    border: none;
    color: var(--gold);
    cursor: pointer;
    font-size: 1.2rem;
    padding: 4px;
    line-height: 1;
    transition: transform 0.2s;
  }
  .play-btn:hover { transform: scale(1.15); }
  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c9a84c, #e8d5ff);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }
  .time-label {
    font-size: 0.75rem;
    color: rgba(184,196,212,0.6);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  /* Loading state */
  .loading-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #050510;
    z-index: 10;
  }
  .loading-overlay.hidden { display: none; }

  .orb-ring {
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--gold);
    border-right-color: rgba(201,168,76,0.3);
    animation: spin 1.2s linear infinite;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(201,168,76,0.3);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: rgba(184,196,212,0.6);
    font-size: 1rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* Transcript below */
  #transcript-area {
    margin-top: 28px;
    display: none;
  }
  .transcript-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .transcript-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 24px;
    font-size: 0.9rem;
    line-height: 1.8;
    color: rgba(184,196,212,0.75);
    max-height: 260px;
    overflow-y: auto;
  }
  .transcript-box::-webkit-scrollbar { width: 4px; }
  .transcript-box::-webkit-scrollbar-track { background: transparent; }
  .transcript-box::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

  /* Slide styles rendered on canvas */
  #slide-title { display: none; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="moon"></div>
  <h1>Learn in Dream</h1>
  <p class="tagline">where knowledge blooms while the world sleeps</p>

  <div class="input-card">
    <span class="prompt-prefix">✦ Tonight's lesson</span>
    <div class="input-row">
      <input type="text" id="topic-input" placeholder="e.g. the lifecycle of stars, quantum entanglement…" />
      <button class="go-btn" id="go-btn" onclick="generateVideo()">Go ✦</button>
    </div>
  </div>

  <div id="output-area">
    <div class="video-wrapper">
      <canvas id="dream-canvas"></canvas>
      <div class="loading-overlay" id="loading-overlay">
        <div class="orb-ring"></div>
        <div class="loading-text">Weaving your dream lesson…</div>
      </div>
    </div>
    <div class="video-bar">
      <button class="play-btn" id="play-btn" onclick="togglePlayback()">⏸</button>
      <div class="progress-track" onclick="seekVideo(event)">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="time-label" id="time-label">0:00 / 0:00</span>
    </div>

    <div id="transcript-area">
      <div class="transcript-label">✦ Full Script</div>
      <div class="transcript-box" id="transcript-box"></div>
    </div>
  </div>
</div>

<script>
// --- Starfield ---
(function(){
  const s = document.getElementById('stars');
  for(let i=0;i<140;i++){
    const el = document.createElement('div');
    el.className='star';
    const size = Math.random()*2.5+0.5;
    el.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*5}s;--o:${0.3+Math.random()*0.7};animation-delay:${Math.random()*6}s`;
    s.appendChild(el);
  }
})();

// --- State ---
let slides = [];
let currentSlide = 0;
let slideStartTime = 0;
let totalDuration = 0;
let isPlaying = false;
let animFrame = null;
let videoStarted = false;
let elapsed = 0;
let lastTimestamp = null;
let fullScript = '';

const canvas = document.getElementById('dream-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrapper = canvas.parentElement;
  canvas.width = wrapper.clientWidth;
  canvas.height = wrapper.clientWidth * 9/16;
}
window.addEventListener('resize', () => { resizeCanvas(); if(videoStarted) renderCurrentSlide(); });
resizeCanvas();

// --- API Call ---
async function generateVideo() {
  const topic = document.getElementById('topic-input').value.trim();
  if(!topic) {
    document.getElementById('topic-input').focus();
    return;
  }

  const btn = document.getElementById('go-btn');
  btn.disabled = true;

  document.getElementById('output-area').style.display = 'block';
  document.getElementById('transcript-area').style.display = 'none';
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('output-area').scrollIntoView({behavior:'smooth', block:'start'});

  const prompt = `Create a video to teach me about: ${topic}. And start with a big title of 'Learn in Dream', it should be 1-2 min long.

Your response must be ONLY valid JSON, no markdown, no explanation. Return an object like:
{
  "slides": [
    {
      "type": "title",
      "headline": "Learn in Dream",
      "subtitle": "Topic subtitle here",
      "duration": 4
    },
    {
      "type": "content",
      "headline": "Section Title",
      "bullets": ["Point one with detail", "Point two with detail", "Point three with detail"],
      "visual": "A short poetic visual description for the background (e.g. 'glowing nebula with drifting particles')",
      "duration": 10
    }
  ],
  "fullScript": "The complete narration script of the entire video as one flowing paragraph, 200-350 words."
}

Rules:
- First slide must be type "title" with headline exactly "Learn in Dream"
- Include 8-12 total slides covering the topic thoroughly
- content slides have 2-4 bullets each, each bullet max 12 words
- Total duration of all slides should sum to 75-110 seconds
- fullScript should be engaging, educational, and poetic in tone
- Vary slide types: use "title", "content", "quote", "fact"
- For type "quote": fields are headline, quote, attribution, duration
- For type "fact": fields are headline, fact (1 big dramatic statement), context, duration`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    slides = parsed.slides;
    fullScript = parsed.fullScript || '';
    totalDuration = slides.reduce((s,sl) => s + (sl.duration||8), 0);

    // show transcript
    if(fullScript) {
      document.getElementById('transcript-box').textContent = fullScript;
      document.getElementById('transcript-area').style.display = 'block';
    }

    // start playback
    document.getElementById('loading-overlay').classList.add('hidden');
    videoStarted = true;
    elapsed = 0;
    lastTimestamp = null;
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
    playLoop();

  } catch(e) {
    document.getElementById('loading-overlay').querySelector('.loading-text').textContent = 'Something went wrong. Please try again.';
    console.error(e);
  }

  btn.disabled = false;
}

// --- Playback ---
function playLoop(ts) {
  if(!isPlaying) return;
  if(lastTimestamp !== null) elapsed += (ts - lastTimestamp) / 1000;
  lastTimestamp = ts;

  // find current slide
  let acc = 0;
  let si = 0;
  for(let i=0;i<slides.length;i++){
    if(elapsed < acc + slides[i].duration){ si=i; slideStartTime=acc; break; }
    acc += slides[i].duration;
    si = slides.length-1;
    slideStartTime = acc - slides[slides.length-1].duration;
  }
  if(elapsed >= totalDuration) {
    elapsed = totalDuration;
    isPlaying = false;
    document.getElementById('play-btn').textContent = '▶';
  }
  currentSlide = si;

  const localT = elapsed - slideStartTime;
  const slideDur = slides[si].duration;
  renderSlide(slides[si], localT, slideDur);

  // progress
  const pct = Math.min(100, (elapsed / totalDuration) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-label').textContent = fmtTime(elapsed) + ' / ' + fmtTime(totalDuration);

  animFrame = requestAnimationFrame(playLoop);
}

function togglePlayback() {
  if(!videoStarted) return;
  isPlaying = !isPlaying;
  document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
  if(isPlaying) {
    if(elapsed >= totalDuration) elapsed = 0;
    lastTimestamp = null;
    animFrame = requestAnimationFrame(playLoop);
  }
}

function seekVideo(e) {
  if(!videoStarted) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  elapsed = pct * totalDuration;
  lastTimestamp = null;
  if(!isPlaying) renderCurrentSlide();
}

function renderCurrentSlide() {
  if(!slides.length) return;
  const localT = elapsed - slideStartTime;
  renderSlide(slides[currentSlide], localT, slides[currentSlide].duration);
}

function fmtTime(s) {
  const m = Math.floor(s/60);
  const ss = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${ss}`;
}

// --- Renderer ---
const PALETTES = [
  ['#0d0d2e','#1a0a3a','#7b5ea7','#c9a84c'],
  ['#050f1a','#0a2030','#4a8fa8','#c9a84c'],
  ['#0d1a0d','#0a2a10','#4a9a6a','#e8c44c'],
  ['#1a0a0a','#2a0a1a','#a84c7b','#c9a84c'],
  ['#0a0a1a','#050a30','#4c5ea8','#e8d5ff'],
];
let paletteIdx = 0;

function getPalette(si) {
  return PALETTES[si % PALETTES.length];
}

function renderSlide(slide, localT, dur) {
  resizeCanvas();
  const W = canvas.width, H = canvas.height;
  const pal = getPalette(currentSlide);

  // fadeIn / fadeOut
  const fadeD = Math.min(0.6, dur*0.15);
  let alpha = 1;
  if(localT < fadeD) alpha = localT/fadeD;
  else if(localT > dur-fadeD) alpha = (dur-localT)/fadeD;
  alpha = Math.max(0, Math.min(1, alpha));

  // Background
  const grad = ctx.createRadialGradient(W*0.5, H*0.4, 0, W*0.5, H*0.4, W*0.8);
  grad.addColorStop(0, pal[1]);
  grad.addColorStop(1, pal[0]);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Animated orb
  const orbX = W * (0.7 + 0.1*Math.sin(localT*0.5));
  const orbY = H * (0.3 + 0.08*Math.cos(localT*0.4));
  const orbR = W * 0.22;
  const og = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orbR);
  og.addColorStop(0, pal[2]+'33');
  og.addColorStop(0.5, pal[2]+'11');
  og.addColorStop(1, 'transparent');
  ctx.fillStyle = og;
  ctx.beginPath(); ctx.arc(orbX, orbY, orbR, 0, Math.PI*2); ctx.fill();

  // Floating particles
  ctx.save();
  ctx.globalAlpha = 0.5;
  for(let i=0;i<18;i++){
    const px = ((i*137.5 + localT*8*(i%3===0?1:-0.5)) % W + W) % W;
    const py = ((i*83.7 + localT*5*(i%2===0?1:-1)) % H + H) % H;
    const pr = (Math.sin(i*1.3)*0.5+0.5)*2+0.5;
    ctx.fillStyle = i%3===0 ? pal[3] : '#ffffff';
    ctx.globalAlpha = (Math.sin(localT+i)*0.5+0.5)*0.4+0.1;
    ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Global fade
  ctx.globalAlpha = alpha;

  if(slide.type === 'title') renderTitleSlide(slide, W, H, pal, localT);
  else if(slide.type === 'quote') renderQuoteSlide(slide, W, H, pal, localT);
  else if(slide.type === 'fact') renderFactSlide(slide, W, H, pal, localT);
  else renderContentSlide(slide, W, H, pal, localT);

  ctx.globalAlpha = 1;
}

function wrapText(text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for(let w of words){
    const test = line ? line+' '+w : w;
    if(ctx.measureText(test).width > maxW && line){
      lines.push({text:line, x, y});
      y += lineH;
      line = w;
    } else line = test;
  }
  if(line) lines.push({text:line, x, y});
  return lines;
}

function drawWrapped(text, x, y, maxW, lineH) {
  const lines = wrapText(text, x, y, maxW, lineH);
  for(const l of lines) ctx.fillText(l.text, l.x, l.y);
  return lines.length;
}

function renderTitleSlide(slide, W, H, pal, t) {
  const cx = W/2;
  // Glow circle
  const gc = ctx.createRadialGradient(cx, H*0.45, 0, cx, H*0.45, H*0.35);
  gc.addColorStop(0, pal[3]+'22');
  gc.addColorStop(1,'transparent');
  ctx.fillStyle=gc; ctx.fillRect(0,0,W,H);

  // Main title
  const fs = Math.min(W*0.09, 72);
  ctx.font = `900 ${fs}px 'Playfair Display', serif`;
  ctx.textAlign = 'center';
  ctx.shadowColor = pal[3];
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#f5e6c8';
  ctx.fillText(slide.headline || 'Learn in Dream', cx, H*0.42);
  ctx.shadowBlur = 0;

  if(slide.subtitle){
    ctx.font = `italic ${Math.min(W*0.035,26)}px 'Playfair Display', serif`;
    ctx.fillStyle = 'rgba(184,196,212,0.8)';
    drawWrapped(slide.subtitle, cx, H*0.56, W*0.7, Math.min(W*0.05,36));
  }

  // Decorative line
  const lw = W*0.12;
  const ly = H*0.65;
  ctx.strokeStyle = pal[3];
  ctx.lineWidth = 1;
  ctx.globalAlpha *= 0.5;
  ctx.beginPath(); ctx.moveTo(cx-lw, ly); ctx.lineTo(cx+lw, ly); ctx.stroke();
  ctx.globalAlpha = Math.min(ctx.globalAlpha*2, 1);
}

function renderContentSlide(slide, W, H, pal, t) {
  const pad = W*0.08;
  // Headline
  const hfs = Math.min(W*0.055, 42);
  ctx.font = `700 ${hfs}px 'Playfair Display', serif`;
  ctx.textAlign = 'left';
  ctx.fillStyle = pal[3];
  ctx.shadowColor = pal[3]; ctx.shadowBlur = 15;
  const hLines = wrapText(slide.headline||'', pad, H*0.2, W*0.84, hfs*1.3);
  for(const l of hLines) ctx.fillText(l.text, l.x, l.y);
  ctx.shadowBlur = 0;

  // Underline
  const lastHL = hLines[hLines.length-1];
  const ulY = (lastHL ? lastHL.y : H*0.2) + hfs*0.3;
  ctx.strokeStyle = pal[3];
  ctx.lineWidth = 2;
  ctx.globalAlpha *= 0.4;
  ctx.beginPath(); ctx.moveTo(pad, ulY); ctx.lineTo(pad+W*0.12, ulY); ctx.stroke();
  ctx.globalAlpha = Math.min(ctx.globalAlpha*2.5, 1);

  // Bullets
  const bullets = slide.bullets || [];
  const bfs = Math.min(W*0.035, 24);
  ctx.font = `400 ${bfs}px 'DM Sans', sans-serif`;
  let by = ulY + H*0.1;
  const lineH = bfs*1.8;
  bullets.forEach((b, i) => {
    // stagger reveal
    const revealT = i * (slide.duration / (bullets.length+1));
    if(t < revealT) return;
    const bAlpha = Math.min(1, (t-revealT)/0.5);
    ctx.save();
    ctx.globalAlpha *= bAlpha;
    // Dot
    ctx.fillStyle = pal[3];
    ctx.beginPath(); ctx.arc(pad+6, by-bfs*0.2, 3, 0, Math.PI*2); ctx.fill();
    // Text
    ctx.fillStyle = 'rgba(230,225,215,0.9)';
    const n = drawWrapped(b, pad+22, by, W*0.82, lineH);
    by += lineH * n + bfs*0.3;
    ctx.restore();
  });
}

function renderQuoteSlide(slide, W, H, pal, t) {
  const cx = W/2;
  // Big quote mark
  ctx.font = `900 ${W*0.15}px 'Playfair Display', serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = pal[2]+'44';
  ctx.fillText('"', cx - W*0.1, H*0.35);

  const qfs = Math.min(W*0.04, 30);
  ctx.font = `italic ${qfs}px 'Playfair Display', serif`;
  ctx.fillStyle = '#f0e8d8';
  ctx.shadowColor = pal[3]; ctx.shadowBlur = 10;
  const qLines = wrapText(slide.quote||'', cx, H*0.4, W*0.72, qfs*1.6);
  const totalH = (qLines.length-1)*qfs*1.6;
  let qy = H*0.5 - totalH/2;
  qLines.forEach(l => { ctx.fillText(l.text, cx, qy); qy += qfs*1.6; });
  ctx.shadowBlur = 0;

  if(slide.attribution){
    ctx.font = `500 ${Math.min(W*0.028,20)}px 'DM Sans', sans-serif`;
    ctx.fillStyle = pal[3];
    ctx.fillText('— '+slide.attribution, cx, qy + qfs*0.8);
  }
  if(slide.headline){
    ctx.font = `700 ${Math.min(W*0.032,22)}px 'Playfair Display', serif`;
    ctx.fillStyle = 'rgba(184,196,212,0.5)';
    ctx.fillText(slide.headline, cx, H*0.22);
  }
}

function renderFactSlide(slide, W, H, pal, t) {
  const cx = W/2;
  if(slide.headline){
    ctx.font = `500 ${Math.min(W*0.032,22)}px 'DM Sans', sans-serif`;
    ctx.textAlign='center';
    ctx.fillStyle = pal[3]+'aa';
    ctx.fillText(slide.headline.toUpperCase(), cx, H*0.22);
  }
  const ffs = Math.min(W*0.058, 44);
  ctx.font = `900 ${ffs}px 'Playfair Display', serif`;
  ctx.textAlign='center';
  ctx.fillStyle='#f5e6c8';
  ctx.shadowColor=pal[2]; ctx.shadowBlur=25;
  const fLines = wrapText(slide.fact||'', cx, H*0.45, W*0.75, ffs*1.3);
  const totalH2 = (fLines.length-1)*ffs*1.3;
  let fy = H*0.5 - totalH2/2;
  fLines.forEach(l=>{ ctx.fillText(l.text,cx,fy); fy+=ffs*1.3; });
  ctx.shadowBlur=0;

  if(slide.context){
    ctx.font=`italic ${Math.min(W*0.028,20)}px 'Playfair Display', serif`;
    ctx.fillStyle='rgba(184,196,212,0.6)';
    drawWrapped(slide.context, cx, fy+H*0.05, W*0.65, Math.min(W*0.04,28));
  }
}

// Enter key
document.getElementById('topic-input').addEventListener('keydown', e => {
  if(e.key==='Enter') generateVideo();
});
